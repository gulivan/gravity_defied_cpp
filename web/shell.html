<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gravity Defied</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #18191c;
      color: #f2f2f2;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      height: 100%;
    }

    .stage {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      padding: 16px;
      box-sizing: border-box;
    }

    canvas.emscripten {
      width: min(100vw - 32px, calc((100vh - 72px) * 4 / 3));
      height: min(calc(100vh - 72px), calc((100vw - 32px) * 3 / 4));
      image-rendering: pixelated;
      background: #fff;
      outline: none;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 40px;
      padding: 8px 14px;
      box-sizing: border-box;
      background: #0f1012;
      font-size: 13px;
      line-height: 1.35;
    }

    #status {
      color: #cfd2d8;
    }

    .keys {
      color: #9ea4ad;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .keys {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="stage">
      <canvas id="canvas" class="emscripten" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
    </div>
    <div class="bar">
      <div id="status">Downloading...</div>
      <div class="keys">Arrow keys to ride. Enter selects. Escape goes back.</div>
    </div>
  </main>
  <script>
    var statusElement = document.getElementById('status');
    var canvasElement = document.getElementById('canvas');

    function showError(prefix, error) {
      var message = error && (error.stack || error.message || error.reason || error);
      statusElement.textContent = prefix + ': ' + message;
      statusElement.style.color = '#ff9b9b';
    }

    var Module = {
      canvas: canvasElement,
      print: function(text) {
        console.log(text);
      },
      printErr: function(text) {
        console.error(text);
        if (text) {
          statusElement.textContent = text;
        }
      },
      setStatus: function(text) {
        statusElement.textContent = text || 'Ready';
      },
      onAbort: function(reason) {
        showError('Aborted', reason);
      },
      onRuntimeInitialized: function() {
        canvasElement.focus();
      }
    };

    window.addEventListener('error', function(event) {
      showError('Error', event.error || event.message);
    });

    window.addEventListener('unhandledrejection', function(event) {
      showError('Unhandled rejection', event.reason);
    });

    window.addEventListener('keydown', function(event) {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Escape', ' '].includes(event.key)) {
        event.preventDefault();
      }
    }, { passive: false });
  </script>
  {{{ SCRIPT }}}
</body>
</html>

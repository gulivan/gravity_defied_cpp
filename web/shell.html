<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gravity Defied</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #18191c;
      color: #f2f2f2;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      height: 100%;
    }

    .stage {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      padding: 16px;
      box-sizing: border-box;
    }

    canvas.emscripten {
      width: min(100vw - 32px, calc((100vh - 72px) * 4 / 3));
      height: min(calc(100vh - 72px), calc((100vw - 32px) * 3 / 4));
      image-rendering: auto;
      touch-action: none;
      background: #fff;
      outline: none;
    }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 40px;
      padding: 8px 14px;
      box-sizing: border-box;
      background: #0f1012;
      font-size: 13px;
      line-height: 1.35;
    }

    #status {
      color: #cfd2d8;
    }

    .keys {
      color: #9ea4ad;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cfd2d8;
      white-space: nowrap;
    }

    .controls select {
      color: #f2f2f2;
      background: #18191c;
      border: 1px solid #34373d;
      border-radius: 4px;
      padding: 4px 24px 4px 8px;
      font: inherit;
    }

    @media (max-width: 640px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .keys,
      .controls {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="stage">
      <canvas id="canvas" class="emscripten" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    </div>
    <div class="bar">
      <div id="status">Downloading...</div>
      <label class="controls">
        Resolution
        <select id="resolutionScale">
          <option value="0.75">0.75x Fast</option>
          <option value="1">1x Balanced</option>
          <option value="1.5">1.5x Sharp</option>
          <option value="2">2x Retina</option>
        </select>
      </label>
      <div class="keys">Arrow keys to ride. Enter selects. Escape goes back.</div>
    </div>
  </main>
  <script>
    var statusElement = document.getElementById('status');
    var canvasElement = document.getElementById('canvas');
    var resolutionScaleElement = document.getElementById('resolutionScale');
    var resolutionScaleStorageKey = 'gravityDefiedResolutionScale';

    function getResolutionScale() {
      var savedScale = 0;
      try {
        savedScale = Number(localStorage.getItem(resolutionScaleStorageKey));
      } catch (error) {
        savedScale = 0;
      }

      if ([0.75, 1, 1.5, 2].includes(savedScale)) {
        return savedScale;
      }
      return 1;
    }

    function setResolutionScale(scale) {
      Module.gravityDefiedResolutionScale = scale;
      resolutionScaleElement.value = String(scale);
      try {
        localStorage.setItem(resolutionScaleStorageKey, String(scale));
      } catch (error) {
      }
    }

    function showError(prefix, error) {
      var message = error && (error.stack || error.message || error.reason || error);
      statusElement.textContent = prefix + ': ' + message;
      statusElement.style.color = '#ff9b9b';
    }

    var Module = {
      canvas: canvasElement,
      gravityDefiedResolutionScale: getResolutionScale(),
      print: function(text) {
        console.log(text);
      },
      printErr: function(text) {
        console.error(text);
        if (text) {
          statusElement.textContent = text;
        }
      },
      setStatus: function(text) {
        statusElement.textContent = text || 'Ready';
      },
      onAbort: function(reason) {
        showError('Aborted', reason);
      },
      onRuntimeInitialized: function() {
        canvasElement.focus();
      }
    };

    resolutionScaleElement.value = String(Module.gravityDefiedResolutionScale);
    resolutionScaleElement.addEventListener('change', function(event) {
      setResolutionScale(Number(event.target.value));
      canvasElement.focus();
    });

    canvasElement.addEventListener('pointerdown', function() {
      canvasElement.focus();
    });

    window.addEventListener('error', function(event) {
      showError('Error', event.error || event.message);
    });

    window.addEventListener('unhandledrejection', function(event) {
      showError('Unhandled rejection', event.reason);
    });

  </script>
  {{{ SCRIPT }}}
</body>
</html>

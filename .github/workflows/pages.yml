name: Deploy WebAssembly to Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - codex/webassembly-pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest

      - name: Build WebAssembly
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release
          cmake --build build-web --target GravityDefied
          mkdir -p pages
          cp build-web/GravityDefied.html pages/index.html
          python3 - <<'PY'
          from pathlib import Path
          index = Path("pages/index.html")
          html = index.read_text()
          patched = html.replace(
              '<script async src=GravityDefied.js></script>',
              '<script src="GravityDefied.js"></script>',
          )
          if patched == html:
              raise SystemExit("GravityDefied.js async script tag was not found")
          index.write_text(patched)
          PY
          cp build-web/GravityDefied.js pages/
          cp build-web/GravityDefied.wasm pages/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
